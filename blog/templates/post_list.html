{% extends 'base.html' %}

{% block title %}
    post-list
{% endblock %}

{% block content %}

<h1>Post List Page</h1>

{%  for post in object_list %}

    <ul>
        <a href="{% url 'post-detail' post.pk %}"><h1>{{ post.title }}</h1></a>
        <h4>{{ post.author.first_name}} {{ post.author.last_name}}</h4>
        <h6>{{ post.post_date }}</h6>
        <p>{{ post.body }}</p>
        <hr>
    </ul>
    
{% endfor %}

{% endblock %}
