{%  extends 'base.html'%}

{% block title %}
    post-detail
{% endblock %}

{% block content %}

    <h1>{{ post.title }}</h1>
    <h4>{{ post.author.first_name}} {{ post.author.last_name}}</h4>
    <hr>
    <p>{{ post.body }}</p>
    <a href="{% url 'post-list' %}" class="btn btn-secondary">Back</a>
    <a href="{% url 'post-update' post.pk %}" class="btn btn-secondary">Update</a>
    <a href="{% url 'post-delete' post.pk %}" class="btn btn-secondary">Delete</a>

{% endblock %}
